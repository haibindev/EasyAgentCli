<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)"/>

  <!-- Terminal prompt ">_" -->
  <path d="M100 190 L190 256 L100 322" stroke="white" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="210" y1="322" x2="310" y2="322" stroke="white" stroke-width="36" stroke-linecap="round"/>

  <!-- Signal arcs (wifi/broadcast) - right side -->
  <path d="M350 216 A50 50 0 0 1 350 296" stroke="white" stroke-width="24" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M385 186 A85 85 0 0 1 385 326" stroke="white" stroke-width="24" stroke-linecap="round" fill="none" opacity="0.75"/>
  <path d="M420 156 A120 120 0 0 1 420 356" stroke="white" stroke-width="24" stroke-linecap="round" fill="none"/>
</svg>
