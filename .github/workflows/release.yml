name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package
        run: npx electron-builder --win --dir
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Zip output
        run: Compress-Archive -Path dist-electron/win-unpacked/* -DestinationPath EasyAgentCli-win-x64.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EasyAgentCli-win-x64
          path: EasyAgentCli-win-x64.zip

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: EasyAgentCli-win-x64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: EasyAgentCli-win-x64.zip
          generate_release_notes: true
